name: Sync docs to Palabre-app

on:
  push:
    branches: [main]
    paths:
      - 'docs/guide/fr/**'
      - 'docs/guide/en/**'
      - 'scripts/sync_docs.py'
      - '.github/workflows/sync-docs.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process docs
        run: python3 scripts/sync_docs.py

      - name: Clone Palabre-app
        env:
          TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/JuReyms/Palabre-app.git palabre-app
          cd palabre-app && git checkout dev

      - name: Copy files
        run: |
          rm -f palabre-app/content/fr/1.get-started/[0-9].*.md palabre-app/content/fr/2.agents/[0-9].*.md palabre-app/content/fr/3.usage/[0-9].*.md palabre-app/content/fr/4.configuration/[0-9].*.md palabre-app/content/fr/5.reference/[0-9].*.md
          rm -f palabre-app/content/en/1.get-started/[0-9].*.md palabre-app/content/en/2.agents/[0-9].*.md palabre-app/content/en/3.usage/[0-9].*.md palabre-app/content/en/4.configuration/[0-9].*.md palabre-app/content/en/5.reference/[0-9].*.md
          rm -f palabre-app/content/fr/6.troubleshooting.md palabre-app/content/fr/7.roadmap.md
          rm -f palabre-app/content/en/6.troubleshooting.md palabre-app/content/en/7.roadmap.md
          cp -R dist/content/. palabre-app/content/

      - name: Commit and push
        working-directory: palabre-app
        env:
          TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --staged --quiet; then
            echo "No changes to sync"
          else
            COMMIT=$(git -C .. rev-parse --short HEAD)
            git commit -m "sync: docs from Palabre@${COMMIT}"
            git push origin dev
          fi
