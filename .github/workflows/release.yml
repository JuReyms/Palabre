# Publication d'une release GitHub
#
# Se déclenche uniquement sur les tags au format vX.Y.Z (ex. v0.1.0, v1.2.3).
# Ne jamais pousser ce tag à la main : utiliser `pnpm version` qui met à jour
# package.json, crée le commit de version et le tag en une seule commande.
#
# Procédure standard :
#   pnpm version patch   # ou minor / major selon l'impact
#   git push && git push --tags
#
# Étapes du workflow :
#   1. Checkout complet (fetch-depth: 0) pour que generate_release_notes
#      puisse comparer les commits depuis le tag précédent
#   2. Installation de pnpm et Node.js 22
#   3. Vérification TypeScript, tests automatisés et compilation
#   4. Empaquetage npm (pnpm pack → tarball .tgz dans le répertoire courant)
#   5. Publication npm via Trusted Publishing (npm publish --provenance)
#   6. Création de la release GitHub avec :
#      - le tarball en pièce jointe (installable via npm/pnpm directement)
#      - les notes de release générées automatiquement depuis les commits
#   7. Push de public/version.json dans Palabre-app (branche dev)
#      → déclenche un rebuild Netlify qui bake la version dans le site

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    permissions:
      # Nécessaire pour créer et écrire la release GitHub
      contents: write
      # Nécessaire pour npm Trusted Publishing / provenance
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Historique complet requis pour la génération des notes de release
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack
        # Produit un tarball palabre-X.Y.Z.tgz dans le répertoire courant
        # Installable avec : pnpm add --global ./palabre-X.Y.Z.tgz
        run: pnpm pack

      - name: Publish to npm
        # Utilise npm Trusted Publishing : pas de token npm stocké dans GitHub.
        # Le package npm doit être configuré avec ce repository et ce workflow.
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tgz'
          # Génère les notes depuis les commits entre ce tag et le précédent
          generate_release_notes: true

      - name: Push version to Palabre-app
        env:
          TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/JuReyms/Palabre-app.git palabre-app
          cd palabre-app && git checkout dev
          echo '{ "tag_name": "${{ github.ref_name }}" }' > public/version.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/version.json
          git commit -m "release: bump version to ${{ github.ref_name }}"
          git push origin dev
