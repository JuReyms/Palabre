# Publication d'une release GitHub
#
# Se déclenche uniquement sur les tags au format vX.Y.Z (ex. v0.1.0, v1.2.3).
# Ne jamais pousser ce tag à la main : utiliser `pnpm version` qui met à jour
# package.json, crée le commit de version et le tag en une seule commande.
#
# Procédure standard :
#   pnpm version patch   # ou minor / major selon l'impact
#   git push && git push --tags
#
# Étapes du workflow :
#   1. Checkout complet (fetch-depth: 0) pour que generate_release_notes
#      puisse comparer les commits depuis le tag précédent
#   2. Installation de pnpm et Node.js 22
#   3. Vérification TypeScript, tests automatisés et compilation
#   4. Empaquetage npm (pnpm pack → tarball .tgz dans le répertoire courant)
#   5. Publication npm via Trusted Publishing (npm publish --provenance)
#   6. Création de la release GitHub avec :
#      - le tarball en pièce jointe (installable via npm/pnpm directement)
#      - les notes de release générées automatiquement depuis les commits
#   7. Push de public/version.json dans Palabre-app (branche dev)
#   8. Création ou rappel d'une PR Palabre-app dev → main
#      → sa fusion manuelle déclenche le build Netlify de production

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Nécessaire pour créer et écrire la release GitHub
      contents: write
      # Nécessaire pour npm Trusted Publishing / provenance
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Historique complet requis pour la génération des notes de release
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          package-manager-cache: false
          registry-url: 'https://registry.npmjs.org'

      # Lit la version de pnpm depuis le champ "packageManager" de package.json
      # sans dépendre d'une action JavaScript séparée.
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.18.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack
        # Produit un tarball palabre-X.Y.Z.tgz dans le répertoire courant
        # Installable avec : pnpm add --global ./palabre-X.Y.Z.tgz
        run: pnpm pack

      - name: Upgrade npm for trusted publishing
        # npm Trusted Publishing requiert npm 11.5.1+ et Node 22.14+.
        # Les images GitHub Node 22 peuvent encore embarquer npm 10.x.
        run: |
          npm install --global npm@^11.5.1
          npm --version

      - name: Publish to npm
        # Utilise npm Trusted Publishing : pas de token npm stocké dans GitHub.
        # Le package npm doit être configuré avec ce repository et ce workflow.
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: '*.tgz'
          # Génère les notes depuis les commits entre ce tag et le précédent
          generate_release_notes: true

      - name: Generate changelog pages
        run: node scripts/sync_changelog.mjs

      - name: Push version to Palabre-app
        env:
          TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/JuReyms/Palabre-app.git palabre-app
          cd palabre-app && git checkout dev
          echo '{ "tag_name": "${{ github.ref_name }}" }' > public/version.json
          cp ../dist/content/fr/9.changelog.md content/fr/9.changelog.md
          cp ../dist/content/en/9.changelog.md content/en/9.changelog.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/version.json content/fr/9.changelog.md content/en/9.changelog.md
          git commit -m "release: bump version to ${{ github.ref_name }}"
          git push origin dev
      - name: Propose Palabre-app production deployment
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          COMPARE_URL="https://github.com/JuReyms/Palabre-app/compare/main...dev?expand=1"
          WORKFLOW_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PR_URL="$(gh pr list \
            --repo JuReyms/Palabre-app \
            --base main \
            --head dev \
            --state open \
            --json url \
            --jq '.[0].url // empty' 2>/dev/null || true)"

          if [ -z "$PR_URL" ]; then
            if PR_URL="$(gh pr create \
              --repo JuReyms/Palabre-app \
              --base main \
              --head dev \
              --title "docs: deploy ${RELEASE_TAG} to production" \
              --body "Proposition automatique après la publication de Palabre CLI ${RELEASE_TAG}. La fusion de dev vers main déclenchera le build Netlify de production. Workflow source : ${WORKFLOW_URL}" 2>/dev/null)"; then
              echo "Created production deployment PR: $PR_URL"
            else
              PR_URL="$COMPARE_URL"
              echo "::warning title=Palabre-app PR not created::Create the production deployment PR manually: $PR_URL"
            fi
          elif gh pr comment "$PR_URL" \
            --body "Palabre CLI ${RELEASE_TAG} a été publiée. Cette PR dev vers main contient maintenant la version et le changelog correspondants. Workflow source : ${WORKFLOW_URL}"; then
            echo "Reused production deployment PR: $PR_URL"
          else
            echo "::warning title=Palabre-app PR reminder not posted::The production deployment PR is still available: $PR_URL"
          fi

          echo "::notice title=Palabre-app production deployment pending::$PR_URL"
          {
            echo "### Palabre-app production deployment"
            echo ""
            echo "La documentation ${RELEASE_TAG} est synchronisée sur dev."
            echo "Fusionner la PR suivante pour déclencher Netlify en production : $PR_URL"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Publish release summary to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: |
          if [ -z "$BLUESKY_HANDLE" ] || [ -z "$BLUESKY_APP_PASSWORD" ]; then
            echo "::warning::Bluesky secrets are not configured; skipping release post."
            exit 0
          fi
          node scripts/post_release_bluesky.mjs --tag "${{ github.ref_name }}"
