name: "Bug report: CLI"
description: Report a problem with the Palabre command-line tool.
title: "[CLI]: "
labels: ["type: bug", "area: cli"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Palabre. Use this form for issues with the `palabre` command itself.
  - type: input
    id: version
    attributes:
      label: Palabre version
      description: Run `palabre --version`.
      placeholder: "0.3.0"
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - npm / pnpm global package
        - Git checkout / linked development version
        - Other
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command that failed
      description: Paste the exact command you ran.
      render: shell
      placeholder: "palabre run --preset codex-claude --subject \"...\""
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect Palabre to do?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant terminal output. Redact secrets, tokens, API keys, and private prompts.
      render: text
  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Paste only the relevant parts of `palabre.config.json`. Redact secrets.
      render: json
